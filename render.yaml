services:
  - type: web
    name: hey-concrete-backend
    env: node
    rootDir: backend

    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false

      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: GROQ_API_KEY_4
        sync: false
      - key: GROQ_API_KEY_5
        sync: false

      - key: FRONTEND_URL
        value: "*"

      - key: GUPSHUP_API_KEY
        sync: false
      - key: GUPSHUP_APP_NAME
        sync: false
      - key: GUPSHUP_SOURCE_NUMBER
        sync: false
      - key: GUPSHUP_BASE_URL
        value: "https://api.gupshup.io/wa/api/v1/msg"
      - key: GUPSHUP_WEBHOOK_SECRET
        sync: false

      - key: ADMIN_API_KEY
        sync: false